name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sovereign
          POSTGRES_PASSWORD: sovereign
          POSTGRES_DB: sovereign_alpha
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U sovereign -d sovereign_alpha"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Run pytest with coverage
        working-directory: backend
        env:
          CEREBRAS_API_KEY: mock_key_for_unit_tests
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://sovereign:sovereign@localhost:5433/sovereign_alpha
          NEWS_API_KEY: ""
          ENVIRONMENT: development
          ALLOWED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000,http://localhost:3000
        run: python -m pytest tests/ -v --cov=services --cov-report=term-missing --cov-fail-under=75

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000